name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: create-release
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: tar -czf jaeger-mcp-server-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release jaeger-mcp-server.exe

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: tar -czf jaeger-mcp-server-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release jaeger-mcp-server

      - uses: softprops/action-gh-release@v2
        with:
          files: jaeger-mcp-server-${{ matrix.target }}.tar.gz
          tag_name: ${{ github.ref_name }}

  publish-release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: publish-release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Sync version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('./npm/package.json', 'utf8'));
            pkg.version = process.env.VERSION;
            fs.writeFileSync('./npm/package.json', JSON.stringify(pkg, null, 2) + '\n');
          " VERSION="$VERSION"

      - name: Publish
        run: npm publish ./npm --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
